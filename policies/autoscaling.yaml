# UTAG default autoscaling profile — CANONICAL as of v2.16.0:
# validated against the `autoscaling-profile` strict contract
# (utag_core.schemas.factory.AutoscalingProfile) by scripts/validate_schemas.py.

template:
  id: autoscaling/default
  version: 1.0.0
  status: canonical
  strict: true
  unknown_fields: reject
  description: >-
    Provider-agnostic autoscaling for UTAG stream workers. Supports bounded local
    process scaling, bwrap/Firecracker execution, scale-to-zero, and generated
    cloud adapters without coupling the canonical policy to Kubernetes or one database.

selection:
  active_profile_env: UTAG_AUTOSCALING_PROFILE
  default_profile: local_jetson_8gb

queue:
  provider: redis_streams
  connection_env: UTAG_REDIS_URL
  streams:
    jobs: utag:jobs
    ingest: utag:ingest
    validate: utag:validate
    evals: utag:evals
    events: utag:events
    dead_letters: utag:dlq
  consumer_group: utag-workers
  consumer_name_template: "{hostname}-{pid}-{worker_index}"
  delivery: at_least_once
  pointers_only: true
  read:
    batch_size: 1
    block_timeout: 5s
  recovery:
    claim_command: XAUTOCLAIM
    claim_idle_after: 60s
    reclaim_interval: 30s
  retention:
    approximate_max_entries: 100000

scaling:
  enabled: true
  scale_to_zero: true
  poll_interval: 5s
  target_jobs_per_worker: 5
  target_oldest_job_age: 30s
  stabilization:
    scale_up: 15s
    scale_down: 120s
  step_limits:
    maximum_add_per_interval: 2
    maximum_remove_per_interval: 1
  signals:
    - queue_depth
    - pending_entries
    - oldest_job_age
    - worker_utilization
    - available_memory
    - available_vram
    - recent_failure_rate
  desired_workers: >-
    clamp(min_workers, max_workers,
    max(ceil(queue_depth / target_jobs_per_worker),
    ceil(oldest_job_age_seconds / target_oldest_job_age_seconds)))
  guardrails:
    refuse_scale_up_when_memory_below_reserve: true
    refuse_scale_up_when_vram_below_reserve: true
    stop_claiming_before_oom: true
    drain_before_scale_down: true
    terminate_only_idle_workers: true
    preserve_inflight_checkpoints: true
    maximum_failure_rate: 0.25

execution:
  # decision of record (Specs/v2.16.0-factory.md): Python supervisor in v1;
  # the Go supervisor remains a declared adapter target
  supervisor: python
  default_isolation: bwrap
  allowed_isolation:
    - process
    - bwrap
    - firecracker
  worker_shutdown_grace: 30s
  hard_kill_after: 45s
  job_timeout: 15m
  resource_contract_required: true

profiles:
  local_jetson_8gb:
    min_workers: 0
    max_workers: 2
    max_llm_workers: 1
    max_embedding_workers: 1
    max_wolfram_kernels: 1
    max_firecracker_vms: 1
    memory_reserve: 2GiB
    vram_reserve: 1GiB
    worker_memory_limit: 2GiB
    worker_cpu_limit: 2
    prefer_remote_over_local_when_oom_risk: true

  local_workstation_16gb:
    min_workers: 1
    max_workers: 4
    max_llm_workers: 2
    max_embedding_workers: 2
    max_wolfram_kernels: 1
    max_firecracker_vms: 2
    memory_reserve: 3GiB
    vram_reserve: 0GiB
    worker_memory_limit: 3GiB
    worker_cpu_limit: 3
    prefer_remote_over_local_when_oom_risk: false

  cloud_burst:
    min_workers: 0
    max_workers: 20
    max_llm_workers: 10
    max_embedding_workers: 10
    max_wolfram_kernels: 2
    max_firecracker_vms: 10
    memory_reserve: 4GiB
    vram_reserve: 0GiB
    worker_memory_limit: 4GiB
    worker_cpu_limit: 4
    prefer_remote_over_local_when_oom_risk: true

state:
  job_store:
    port: JobStorePort
    provider_env: UTAG_JOB_STORE_PROVIDER
    default_provider: sqlite
    supported_providers:
      - sqlite
      - postgres
  vector_store:
    port: VectorStorePort
    provider_env: UTAG_VECTOR_STORE_PROVIDER
    default_provider: sqlite_vec
    supported_providers:
      - sqlite_vec
      - pgvector
  artifact_store:
    port: ArtifactStorePort
    provider_env: UTAG_ARTIFACT_STORE_PROVIDER
    default_provider: filesystem
    supported_providers:
      - filesystem
      - s3_compatible

cache:
  exact:
    provider: redis
    ttl: 15m
  semantic:
    provider_ref: state.vector_store
    similarity_threshold: 0.94
    ttl: 24h
    key_material:
      - normalized_input_digest
      - schema_digest
      - generator_version
      - provider_id
      - model_id

retries:
  maximum_attempts: 3
  backoff:
    strategy: exponential_jitter
    initial: 2s
    maximum: 2m
  retryable:
    - provider_rate_limit
    - provider_timeout
    - worker_lost
    - transient_network
    - resource_temporarily_unavailable
  terminal:
    - schema_invalid
    - permission_denied
    - unsupported_capability
    - deterministic_failure_repeated

dead_letter_queue:
  enabled: true
  stream_ref: queue.streams.dead_letters
  include:
    - original_job_pointer
    - schema_digest
    - workflow_ref
    - attempts
    - validation_reports
    - execution_trace_ref
    - provider_history
    - resource_usage
    - failure_fingerprint
  evaluator_requeue_requires:
    - validated_overlay
    - passing_regression_eval
    - new_attempt_budget

observability:
  metrics:
    - stream_queue_depth
    - stream_pending_entries
    - oldest_job_age_seconds
    - active_workers
    - desired_workers
    - worker_memory_bytes
    - worker_vram_bytes
    - cache_hit_ratio
    - job_duration_seconds
    - retry_count
    - dead_letter_count
  structured_logs: true
  trace_propagation: true
  event_stream_ref: queue.streams.events

adapter_targets:
  local_go_supervisor:
    enabled: true
  systemd_transient_units:
    enabled: true
  keda_scaled_object:
    enabled: false
    generate_from_policy: true
  nomad_scaling_policy:
    enabled: false
    generate_from_policy: true

validation:
  require_schema_validation: true
  require_unknown_field_rejection: true
  require_profile_resource_limits: true
  require_dlq_for_at_least_once_delivery: true
  require_scale_down_drain: true
  require_determinism_test: true
