id: utag-console
version: 1.1.0
brand:
  name: UTAG
  voice: verification-first
tokens:
  color:
    bg: "#0b0d10"
    fg: "#e6e8ea"
    accent: "#4f8cff"
    danger: "#ff5d5d"
    success: "#3ecf8e"
  spacing:
    "1": 4px
    "2": 8px
    "3": 16px
    "4": 24px
  radius:
    sm: 4px
    md: 8px
  typography:
    sans: "Inter, system-ui, sans-serif"
    mono: "JetBrains Mono, monospace"
  shadow:
    card: "0 1px 3px rgba(0,0,0,.4)"
  motion:
    fast: 120ms
themes:
  light:
    bg: "#ffffff"
    fg: "#111418"
  dark:
    bg: "#0b0d10"
    fg: "#e6e8ea"
components:
  - id: nav-sidebar
    type: nav
  - id: run-status-card
    type: card
    props:
      title: Run status
      resource: runs
    states: [idle, loading, error]
  - id: run-table
    type: table
    props:
      resource: runs
  - id: run-inspector
    type: panel
    props:
      resource: runs
  - id: run-timeline
    type: timeline
    props:
      resource: runs
    states: [idle, loading]
  - id: validation-report-panel
    type: panel
    props:
      resource: validation-reports
  - id: schema-validation-inspector
    type: panel
    props:
      resource: schema-reports
  - id: artifact-manifest-panel
    type: panel
    props:
      resource: artifacts
  - id: artifact-diff-viewer
    type: panel
    props:
      resource: artifacts
  - id: generator-coverage-matrix
    type: matrix
    props:
      resource: registry
  - id: provider-capability-matrix
    type: matrix
    props:
      resource: ai-providers
  - id: mcp-tool-browser
    type: table
    props:
      resource: mcp-tools
  - id: arazzo-workflow-graph
    type: graph
    props:
      resource: workflows
  - id: openapi-operation-explorer
    type: table
    props:
      resource: openapi-operations
  - id: design-token-explorer
    type: panel
    props:
      resource: design-tokens
  - id: autoresearch-task-board
    type: board
    props:
      resource: autoresearch-tasks
  - id: cost-latency-chart
    type: chart
    props:
      resource: metrics
  - id: model-call-trace-panel
    type: panel
    props:
      resource: model-calls
  - id: queue-dlq-panel
    type: board
    props:
      resource: jobs
  - id: policy-settings-panel
    type: panel
    props:
      resource: policies
layouts:
  - id: console-shell
    regions: [sidebar, header, main, inspector]
routes:
  - path: /
    layout: console-shell
    components: [run-status-card, run-timeline, cost-latency-chart]
  - path: /runs
    layout: console-shell
    components: [run-table, run-inspector, run-timeline]
  - path: /validation
    layout: console-shell
    components: [validation-report-panel, schema-validation-inspector]
  - path: /artifacts
    layout: console-shell
    components: [artifact-manifest-panel, artifact-diff-viewer]
  - path: /registry
    layout: console-shell
    components: [generator-coverage-matrix]
  - path: /openapi
    layout: console-shell
    components: [openapi-operation-explorer]
  - path: /mcp
    layout: console-shell
    components: [mcp-tool-browser]
  - path: /workflows
    layout: console-shell
    components: [arazzo-workflow-graph]
  - path: /tokens
    layout: console-shell
    components: [design-token-explorer]
  - path: /autoresearch
    layout: console-shell
    components: [autoresearch-task-board]
  - path: /ai
    layout: console-shell
    components: [provider-capability-matrix, model-call-trace-panel]
  - path: /queue
    layout: console-shell
    components: [queue-dlq-panel]
  - path: /settings
    layout: console-shell
    components: [policy-settings-panel]
interactions:
  - id: select-run
    source: run-table
    target: run-inspector
  - id: select-validation-finding
    source: validation-report-panel
    target: schema-validation-inspector
  - id: select-artifact
    source: artifact-manifest-panel
    target: artifact-diff-viewer
data:
  resources: [runs, validation-reports, artifacts, registry, ai-providers,
              mcp-tools, workflows, openapi-operations, design-tokens,
              autoresearch-tasks, model-calls, metrics, schema-reports,
              jobs, policies]
  contracts:
    runs: run-trace
    validation-reports: validation-report
    schema-reports: validation-report
    artifacts: artifact-manifest
    registry: generator-manifest
    ai-providers: ai-provider-manifest
    mcp-tools: mcp-tool-contract
    workflows: autoresearch-plan
    openapi-operations: open-api-operation
    design-tokens: css-variable-manifest
    autoresearch-tasks: autoresearch-task
    model-calls: model-call-trace
    metrics: metric-point
    jobs: worker-job-trace
    policies: model-router-policy
accessibility:
  minContrast: AA
  keyboardRequired: true
