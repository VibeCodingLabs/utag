openapi: 3.1.0
info:
  title: Petstore
  version: 2.0.0
servers:
  - url: https://api.example.com/v2
security:
  - apiKey: []
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets with paging
      tags: [pets]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by id
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pets/{petId}/photos:
    post:
      operationId: addPetPhoto
      summary: Attach a photo
      tags: [pets, media]
      responses:
        "201":
          description: Created
components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-Api-Key
      in: header
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        tag:
          type: string
        photoUrls:
          type: array
          items:
            type: string
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
