id: ci
name: Main CI (tests + determinism release gate + sources verify)
version: 1.0.0
kind: automation
entrypoints:
  - "uv run pytest"
  - "uv run python scripts/release.py"
  - "uv run python scripts/sources.py"
test_files:
  - tests/unit/test_automation_manifest.py
  - tests/integration/test_github_workflow_static_validation.py
validation_gates:
  - automation-doctor
extensions:
  note: the workflow additionally builds the Go control-plane and runs postgres-backed e2e; those steps are environment-provided in CI.
