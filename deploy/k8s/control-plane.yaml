apiVersion: apps/v1
kind: Deployment
metadata: {name: utag-control-plane, labels: {app: utag-control-plane}}
spec:
  replicas: 2
  selector: {matchLabels: {app: utag-control-plane}}
  template:
    metadata: {labels: {app: utag-control-plane}}
    spec:
      securityContext: {runAsNonRoot: true}
      containers:
        - name: control-plane
          image: ghcr.io/OWNER/utag-control-plane:2.4.0   # goreleaser/CI publishes
          ports: [{containerPort: 8080}]
          envFrom: [{secretRef: {name: utag-secrets}}]     # UTAG_DATABASE_URL, UTAG_API_TOKEN, UTAG_GITHUB_*, UTAG_SLACK_*
          readinessProbe: {httpGet: {path: /healthz, port: 8080}, periodSeconds: 5}
          livenessProbe: {httpGet: {path: /healthz, port: 8080}, periodSeconds: 15}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata: {name: utag-control-plane}
spec:
  selector: {app: utag-control-plane}
  ports: [{port: 80, targetPort: 8080}]
