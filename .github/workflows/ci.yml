name: ci
on:
  push: {branches: [main]}
  pull_request:
permissions: {contents: read}

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: {POSTGRES_USER: utag, POSTGRES_PASSWORD: utag, POSTGRES_DB: utag}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U utag" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: "1.24"}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen || uv sync   # frozen once uv.lock is committed
      - name: build control-plane
        run: cd control-plane && go vet ./... && CGO_ENABLED=0 go build -o utag-control-plane .
      - name: tests (unit+integration+conformance+golden, incl. e2e + postgres)
        env: {UTAG_TEST_PG: "postgres://utag:utag@127.0.0.1:5432/utag"}
        run: uv run pytest -q
      - name: release gate (determinism)
        run: uv run python scripts/release.py
      - name: sources verify
        run: uv run python scripts/sources.py

  live-provider-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen || uv sync
      - name: live smoke (skips cleanly when secret absent)
        env: {ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"}
        run: uv run pytest tests/smoke -q

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goreleaser/goreleaser-action@v6
        with: {args: check}
