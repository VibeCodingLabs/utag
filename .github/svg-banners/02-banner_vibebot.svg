<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%" role="img" aria-labelledby="vibebot-title vibebot-desc" shape-rendering="geometricPrecision">
  <title id="vibebot-title">VibeBot VibeCoding Assistant</title>
  <desc id="vibebot-desc">A neon blue and green cyber-themed banner with an audio visualizer</desc>
  <defs>
    <!-- UX: Deepened contrast gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040b17" />
      <stop offset="50%" stop-color="#020812" />
      <stop offset="100%" stop-color="#010305" />
    </linearGradient>

    <!-- UX: Added color-interpolation-filters for accurate glowing -->
    <filter id="neon-blue" color-interpolation-filters="sRGB" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neon-green" color-interpolation-filters="sRGB" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- UX: Text shadow for legibility over neon lines -->
    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <style>
      /* UX: Bulletproof reduce-motion fallback */
      @media (prefers-reduced-motion: reduce) {
        .wave { animation: none !important; transform: scaleY(0.7) !important; opacity: 0.6 !important; }
      }

      /* UX: Fallback font stacks */
      .title {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-weight: 900;
        font-size: 64px;
        fill: #f8fafc; /* UX: Softer white for eye comfort */
        font-style: italic;
        letter-spacing: -1.5px;
      }

      .subtitle {
        font-family: ui-monospace, SFMono-Regular, "Courier New", Courier, Menlo, Monaco, Consolas, monospace;
        font-size: 17px; /* UX: Increased size */
        fill: #34d399; /* UX: Brighter, more accessible green */
        letter-spacing: 3px;
        font-weight: 700;
      }

      /* UX: Smoother, slower audio wave animation */
      .wave {
        fill: none;
        stroke-width: 4.5; /* UX: Thicker lines */
        stroke-linecap: round;
        animation: eq 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        transform-origin: bottom;
      }

      @keyframes eq {
        0% { transform: scaleY(0.3); opacity: 0.4; }
        100% { transform: scaleY(1); opacity: 0.9; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- UX: Outer border -->
  <rect width="100%" height="100%" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- UX: Hide decorative audio visualizer from screen readers -->
  <g aria-hidden="true">
    <g transform="translate(0, 160)" opacity="0.4">
      <!-- Left side -->
      <line x1="100" y1="0" x2="100" y2="-60" stroke="#60a5fa" class="wave" style="animation-delay: 0.1s;" filter="url(#neon-blue)"/>
      <line x1="130" y1="0" x2="130" y2="-100" stroke="#34d399" class="wave" style="animation-delay: 0.4s;" filter="url(#neon-green)"/>
      <line x1="160" y1="0" x2="160" y2="-40" stroke="#60a5fa" class="wave" style="animation-delay: 0.7s;" filter="url(#neon-blue)"/>
      <line x1="190" y1="0" x2="190" y2="-120" stroke="#34d399" class="wave" style="animation-delay: 0.2s;" filter="url(#neon-green)"/>
      <line x1="220" y1="0" x2="220" y2="-80" stroke="#60a5fa" class="wave" style="animation-delay: 0.9s;" filter="url(#neon-blue)"/>

      <!-- Right side -->
      <line x1="580" y1="0" x2="580" y2="-80" stroke="#60a5fa" class="wave" style="animation-delay: 0.5s;" filter="url(#neon-blue)"/>
      <line x1="610" y1="0" x2="610" y2="-120" stroke="#34d399" class="wave" style="animation-delay: 0.8s;" filter="url(#neon-green)"/>
      <line x1="640" y1="0" x2="640" y2="-40" stroke="#60a5fa" class="wave" style="animation-delay: 0.1s;" filter="url(#neon-blue)"/>
      <line x1="670" y1="0" x2="670" y2="-100" stroke="#34d399" class="wave" style="animation-delay: 1.0s;" filter="url(#neon-green)"/>
      <line x1="700" y1="0" x2="700" y2="-60" stroke="#60a5fa" class="wave" style="animation-delay: 0.3s;" filter="url(#neon-blue)"/>

      <!-- Mirrored bottom -->
      <g transform="scale(1, -1)">
        <line x1="100" y1="0" x2="100" y2="-60" stroke="#60a5fa" class="wave" style="animation-delay: 0.1s;" filter="url(#neon-blue)"/>
        <line x1="130" y1="0" x2="130" y2="-100" stroke="#34d399" class="wave" style="animation-delay: 0.4s;" filter="url(#neon-green)"/>
        <line x1="160" y1="0" x2="160" y2="-40" stroke="#60a5fa" class="wave" style="animation-delay: 0.7s;" filter="url(#neon-blue)"/>
        <line x1="190" y1="0" x2="190" y2="-120" stroke="#34d399" class="wave" style="animation-delay: 0.2s;" filter="url(#neon-green)"/>
        <line x1="220" y1="0" x2="220" y2="-80" stroke="#60a5fa" class="wave" style="animation-delay: 0.9s;" filter="url(#neon-blue)"/>

        <line x1="580" y1="0" x2="580" y2="-80" stroke="#60a5fa" class="wave" style="animation-delay: 0.5s;" filter="url(#neon-blue)"/>
        <line x1="610" y1="0" x2="610" y2="-120" stroke="#34d399" class="wave" style="animation-delay: 0.8s;" filter="url(#neon-green)"/>
        <line x1="640" y1="0" x2="640" y2="-40" stroke="#60a5fa" class="wave" style="animation-delay: 0.1s;" filter="url(#neon-blue)"/>
        <line x1="670" y1="0" x2="670" y2="-100" stroke="#34d399" class="wave" style="animation-delay: 1.0s;" filter="url(#neon-green)"/>
        <line x1="700" y1="0" x2="700" y2="-60" stroke="#60a5fa" class="wave" style="animation-delay: 0.3s;" filter="url(#neon-blue)"/>
      </g>
    </g>

    <path d="M 0 20 L 800 20" stroke="#60a5fa" stroke-width="2.5" filter="url(#neon-blue)" opacity="0.6"/>
    <path d="M 0 300 L 800 300" stroke="#34d399" stroke-width="2.5" filter="url(#neon-green)" opacity="0.6"/>
  </g>

  <!-- UX: Grouped text + shadow -->
  <g filter="url(#text-shadow)" text-anchor="middle" dominant-baseline="middle">
    <text x="400" y="145" class="title">VibeBot</text>
    <text x="400" y="210" class="subtitle" filter="url(#neon-green)">VibeCoding Assistant</text>
  </g>
</svg>
