<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%" role="img" aria-labelledby="nsfwstudio-title nsfwstudio-desc" shape-rendering="geometricPrecision">
  <title id="nsfwstudio-title">NSFWStudio CakeVoid Productions</title>
  <desc id="nsfwstudio-desc">An elegant dark banner featuring fluid floating pink and cream abstract shapes</desc>
  <defs>
    <!-- UX: True black gradient with subtle gray vignette -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1c1c1c" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>

    <!-- Pink abstract shape gradient -->
    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff478a" /> <!-- UX: Lifted contrast of pink -->
      <stop offset="100%" stop-color="#ff9bc1" />
    </linearGradient>

    <!-- Cream abstract shape gradient -->
    <linearGradient id="cream-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5edea" />
    </linearGradient>

    <!-- UX: color-interpolation-filters added -->
    <filter id="soft-shadow" color-interpolation-filters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <filter id="pink-glow" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.85"/>
    </filter>

    <style>
      /* UX: Fallback animation killer */
      @media (prefers-reduced-motion: reduce) {
        .float, .float-reverse { animation: none !important; transform: none !important; }
      }

      /* UX: Robust font stack */
      .title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-weight: 300;
        font-size: 68px;
        fill: #fdfdfd;
        letter-spacing: -0.5px;
      }

      .title-bold {
        font-weight: 900;
      }

      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 15px; /* UX: Bumbed size */
        fill: #ff9bc1;
        letter-spacing: 7px;
        text-transform: uppercase;
        font-weight: bold;
      }

      /* UX: Considerably slowed fluid animations (from 20s to 40s) */
      .float {
        animation: floatShape 40s ease-in-out infinite alternate;
      }
      .float-reverse {
        animation: floatShapeRev 50s ease-in-out infinite alternate;
      }

      @keyframes floatShape {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        50% { transform: translate(20px, -15px) rotate(3deg) scale(1.02); }
        100% { transform: translate(-15px, 20px) rotate(-3deg) scale(0.98); }
      }
      @keyframes floatShapeRev {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        50% { transform: translate(-25px, 15px) rotate(-5deg) scale(0.95); }
        100% { transform: translate(15px, -25px) rotate(5deg) scale(1.05); }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="none" stroke="#222222" stroke-width="2"/> <!-- UX: Border -->

  <g aria-hidden="true" filter="url(#soft-shadow)"> <!-- UX: Grouping aria-hidden -->
    <path class="float" fill="url(#cream-grad)" opacity="0.12"
          d="M 600,100 C 700,50 850,150 750,300 C 650,450 450,350 500,200 C 550,50 500,150 600,100 Z" />

    <path class="float-reverse" fill="url(#pink-grad)" opacity="0.18"
          d="M 150,250 C 50,300 -50,150 50,50 C 150,-50 350,50 300,200 C 250,350 250,200 150,250 Z" />

    <circle cx="120" cy="80" r="40" fill="none" stroke="url(#pink-grad)" stroke-width="2" class="float" opacity="0.5"/>
    <rect x="650" y="200" width="60" height="60" fill="none" stroke="url(#cream-grad)" stroke-width="2" class="float-reverse" opacity="0.3" transform="rotate(45 680 230)"/>
  </g>

  <g filter="url(#text-shadow)" text-anchor="middle" dominant-baseline="middle">
    <text x="400" y="145" class="title">
      NSFW<tspan class="title-bold">Studio</tspan>
    </text>
    <text x="400" y="210" class="subtitle" filter="url(#pink-glow)">CakeVoid Productions</text>
  </g>
</svg>
