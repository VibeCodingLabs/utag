<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%" role="img" aria-label="Universal Typed Artifact Generator - Provider-Agnostic Animated Blueprint Banner">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- General glow filter for lines and secondary elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Lessened text glow for better readability -->
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.75" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1.25"/>
    </pattern>
    <pattern id="subgrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#0f172a" stroke-width="0.75"/>
    </pattern>

    <style>
      @media (prefers-reduced-motion: reduce) {
        .anim-line {
          animation: none !important;
          stroke-dasharray: none !important;
          stroke-dashoffset: 0 !important;
        }
        .anim-pulse, .anim-grid, .anim-scan, .anim-rotate {
          animation: none !important;
          opacity: 0.9 !important;
          transform: none !important;
        }
      }

      .title {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-weight: 900;
        /* Increased font size */
        font-size: 34px;
        fill: #f1f5f9;
        /* Added thin black border (stroke) for readability */
        stroke: #020617;
        stroke-width: 0.8px;
        letter-spacing: 2.5px;
      }

      .subtitle {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        fill: #38bdf8;
        letter-spacing: 5px;
        font-weight: 700;
      }

      .anim-line {
        stroke: #38bdf8;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 1800;
        stroke-dashoffset: 1800;
        animation: drawLine 16s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
      }
      @keyframes drawLine {
        0% { stroke-dashoffset: 1800; }
        15% { stroke-dashoffset: 1800; }
        85% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 0; }
      }

      .anim-pulse {
        opacity: 0.4;
        animation: pulse 8s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        0% { opacity: 0.4; }
        100% { opacity: 1; }
      }

      .anim-grid {
        animation: gridPulse 14s ease-in-out infinite alternate;
      }
      @keyframes gridPulse {
        0% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      .anim-scan {
        opacity: 0.1;
        animation: scanline 20s linear infinite;
      }
      @keyframes scanline {
        0% { transform: translateY(-100px); }
        100% { transform: translateY(300px); }
      }

      .anim-rotate {
        transform-origin: center;
        animation: rotateMarker 40s linear infinite;
      }
      @keyframes rotateMarker {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <g class="anim-grid">
    <rect width="100%" height="100%" fill="url(#subgrid)"/>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </g>

  <rect x="0" y="0" width="800" height="4" fill="#0ea5e9" class="anim-scan"/>

  <g stroke="#1e293b" stroke-width="1.25">
    <path d="M 20 20 L 780 20 L 780 180 L 20 180 Z" fill="none"/>

    <path d="M 15 30 L 15 15 L 30 15" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <path d="M 785 30 L 785 15 L 770 15" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <path d="M 15 170 L 15 185 L 30 185" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <path d="M 785 170 L 785 185 L 770 185" fill="none" stroke="#38bdf8" stroke-width="2.5"/>

    <path d="M 40 20 L 40 180 M 20 40 L 780 40 M 760 20 L 760 180 M 20 160 L 780 160" class="anim-pulse"/>
  </g>

  <g class="anim-pulse" stroke="#0ea5e9" stroke-width="1.25" fill="none">
    <g transform="translate(40,40)">
      <circle cx="0" cy="0" r="10"/>
      <g class="anim-rotate">
        <path d="M -15 0 L -5 0 M 5 0 L 15 0 M 0 -15 L 0 -5 M 0 5 L 0 15"/>
      </g>
    </g>
    <g transform="translate(760,160)">
      <circle cx="0" cy="0" r="10"/>
      <g class="anim-rotate">
        <path d="M -15 0 L -5 0 M 5 0 L 15 0 M 0 -15 L 0 -5 M 0 5 L 0 15"/>
      </g>
    </g>
  </g>

  <path d="M 40 160 L 40 40 L 760 40 L 760 160" fill="none" class="anim-line" filter="url(#glow)"/>

  <g filter="url(#text-glow)">
    <text x="400" y="85" text-anchor="middle" dominant-baseline="middle" class="title">
      Universal Typed Artifact Generator
    </text>
  </g>

  <rect x="240" y="112" width="320" height="28" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="126" text-anchor="middle" dominant-baseline="middle" class="subtitle" filter="url(#glow)">
    PROVIDER-AGNOSTIC
  </text>

  <circle cx="40" cy="40" r="2.5" fill="#bae6fd" class="anim-pulse"/>
  <circle cx="760" cy="40" r="2.5" fill="#bae6fd" class="anim-pulse"/>
  <circle cx="40" cy="160" r="2.5" fill="#bae6fd" class="anim-pulse"/>
  <circle cx="760" cy="160" r="2.5" fill="#bae6fd" class="anim-pulse"/>

  <text x="50" y="35" font-family="monospace" font-size="10" fill="#64748b" font-weight="bold">SRC_x00</text>
  <text x="750" y="155" font-family="monospace" font-size="10" fill="#64748b" font-weight="bold" text-anchor="end">DEST_x80</text>

  <text x="400" y="165" font-family="monospace" font-size="10.5" fill="#475569" text-anchor="middle" letter-spacing="1.5px">
    GEN-01 // PYDANTIC // ZOD // OPENAPI // AGENT SKILLS
  </text>
</svg>
