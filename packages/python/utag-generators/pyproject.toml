[project]
name = "utag-generators"
version = "2.11.0"
requires-python = ">=3.12"
dependencies = ["utag-core", "utag-adapters", "jsonschema>=4.26,<5", "openapi-spec-validator>=0.9,<1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utag_generators"]
