[project]
name = "utag-worker"
version = "2.4.0"
requires-python = ">=3.12"
dependencies = ["utag-core", "utag-generators"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utag_worker"]

[project.scripts]
utag-worker = "utag_worker.worker:main"
