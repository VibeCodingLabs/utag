[project]
name = "utag-cli"
version = "2.3.0"
requires-python = ">=3.12"
dependencies = ["utag-core", "utag-generators"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utag_cli"]

[project.scripts]
utag = "utag_cli.main:main"
