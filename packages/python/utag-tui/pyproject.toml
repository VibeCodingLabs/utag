[project]
name = "utag-tui"
version = "2.11.0"
description = "utag terminal UI — thin Textual client of the control-plane job API"
requires-python = ">=3.12"
dependencies = ["utag-worker", "textual>=8,<9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utag_tui"]

[project.scripts]
utag-tui = "utag_tui.app:main"
